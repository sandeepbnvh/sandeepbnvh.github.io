    <!-- Theme Prevention Script (FOUC) -->
    <script>
      {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
          // Update the meta tag value to keep the native UI scheme in sync
          const meta = document.querySelector('meta[name="color-scheme"]');
          if (meta) {
            meta.content = savedTheme === "dark" ? "dark" : "light";
          }
        }
      }
    </script>
